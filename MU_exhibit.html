<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
  :root {
    --navy:#0a1628; --gold:#b8930a; --gold-mid:#c9a84c; --gold-light:#e8d5a0;
    --navy-dim:#4a6080; --navy-mid:#1e3a5f; --rule:#ddd8d0; --off:#f7f4ef; --white:#ffffff;
    --up:#2a7a4f; --down:#a0291e; --neutral:#4a6080;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; background:var(--white); font-family:'Anonymous Pro',monospace; }
  .exhibit { width:100%; background:var(--white); border:1px solid var(--rule); }

  /* HEADER */
  .hdr { padding:16px 24px 12px; border-bottom:2px solid var(--navy); }
  .eyebrow { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:5px; }
  .hdr-row { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px; }
  .title { font-family:'Playfair Display',serif; font-size:22px; color:var(--navy); font-weight:700; line-height:1.2; }
  .title em { font-style:italic; color:var(--gold); }
  .meta { text-align:right; }
  .price-display { font-family:'Playfair Display',serif; font-size:28px; font-weight:700; color:var(--navy); }
  .price-change { font-size:12px; font-weight:700; margin-top:2px; }
  .price-change.up { color:var(--up); }
  .price-change.down { color:var(--down); }
  .gold-rule { width:40px; height:2px; background:var(--gold-mid); margin-top:8px; }

  /* CONTROLS */
  .controls { padding:10px 24px; border-bottom:1px solid var(--rule); display:flex; align-items:center; gap:6px; background:var(--off); flex-wrap:wrap; }
  .ctrl-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--navy-dim); margin-right:4px; }
  .range-btn { font-family:'Anonymous Pro',monospace; font-size:11px; font-weight:700; padding:4px 10px; border:1px solid var(--rule); background:var(--white); color:var(--navy-dim); cursor:pointer; letter-spacing:0.08em; transition:all 0.15s; }
  .range-btn:hover { border-color:var(--gold); color:var(--gold); }
  .range-btn.active { background:var(--navy); color:var(--gold); border-color:var(--navy); }
  .divider { width:1px; height:18px; background:var(--rule); margin:0 6px; }
  .marker-toggle { font-family:'Anonymous Pro',monospace; font-size:11px; padding:4px 10px; border:1px solid var(--rule); background:var(--white); color:var(--navy-dim); cursor:pointer; display:flex; align-items:center; gap:5px; transition:all 0.15s; }
  .marker-toggle.active { border-color:var(--gold-mid); color:var(--gold); background:rgba(184,147,10,0.06); }
  .marker-dot { width:7px; height:7px; border-radius:50%; background:var(--gold); flex-shrink:0; }

  /* CHARTS */
  .charts { padding:16px 24px 8px; }
  .chart-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--navy-dim); margin-bottom:4px; }
  .chart-wrap { position:relative; width:100%; }
  .chart-wrap.price-wrap { height:0; padding-bottom:42%; }
  .chart-wrap.vol-wrap { height:0; padding-bottom:12%; margin-top:6px; }
  .chart-wrap.pct-wrap { height:0; padding-bottom:14%; margin-top:6px; }
  .chart-wrap canvas { position:absolute; top:0; left:0; width:100%!important; height:100%!important; }

  /* EVENT TOOLTIP */
  .event-tip { position:absolute; background:var(--navy); color:var(--gold-light); font-family:'Anonymous Pro',monospace; font-size:11px; padding:7px 10px; pointer-events:none; opacity:0; transition:opacity 0.15s; z-index:10; max-width:200px; line-height:1.5; border-left:2px solid var(--gold); }
  .event-tip.visible { opacity:1; }

  /* LEGEND */
  .legend { padding:8px 24px; border-top:1px solid var(--rule); display:flex; gap:20px; flex-wrap:wrap; }
  .leg { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--navy-dim); }
  .leg-line { width:18px; height:2px; }
  .leg-dot { width:8px; height:8px; border-radius:50%; background:var(--gold); border:1px solid var(--navy); }

  /* FOOTER */
  .ftr { padding:8px 24px; border-top:1px solid var(--rule); display:flex; justify-content:space-between; align-items:center; background:var(--off); flex-wrap:wrap; gap:6px; }
  .ftr-note { font-size:10px; color:var(--navy-dim); font-style:italic; }
  .ftr-brand { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); font-weight:700; }
</style>
</head>

// ── EVENT MARKERS ─────────────────────────────────────────────────────────────
const EVENTS = [
  { d:"2026-03-18", label:"Earnings: Blowout quarter\nRevenue $23.86B vs $12.88B est.\nCEO: demand cannot be met", color:"#b8930a" },
  { d:"2026-03-19", label:"Day 1 post-earnings\nFirst leg of decline begins\nAlgorithmic selling triggers", color:"#a0291e" },
  { d:"2026-03-25", label:"Session 6: -22% from ATH\nAlphabet TurboQuant cited\nas demand destruction catalyst", color:"#a0291e" },
  { d:"2026-03-30", label:"Session 8: -30% from earnings\nVolume spike: 73.9M shares\nBroadest media coverage", color:"#a0291e" },
  { d:"2026-01-30", label:"Jan 30: ATH at $455.50\nAI memory shortage thesis\nat peak certainty — +50% YTD", color:"#2a7a4f" }
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let showMarkers = true;
let currentRange = '3m';
let priceChart, volChart, pctChart;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function filterByRange(data, range) {
  const last = new Date(data[data.length-1].d);
  const cutoffs = { '1m':30, '3m':90, '1y':365, '3y':1095, 'all':99999 };
  const days = cutoffs[range] || 90;
  const cutoff = new Date(last); cutoff.setDate(cutoff.getDate() - days);
  return data.filter(r => new Date(r.d) >= cutoff);
}

function movingAvg(data, n=30) {
  return data.map((r,i) => {
    if(i < n-1) return null;
    const slice = data.slice(i-n+1, i+1);
    return +(slice.reduce((s,d)=>s+d.c,0)/n).toFixed(2);
  });
}

function pctChange(data) {
  return data.map((r,i) => {
    if(i===0) return 0;
    return +((r.c - data[i-1].c)/data[i-1].c*100).toFixed(2);
  });
}

function fmtVol(v) {
  if(v>=1000) return (v/1000).toFixed(1)+'B';
  return v.toFixed(1)+'M';
}

// ── CHART DEFAULTS ────────────────────────────────────────────────────────────
Chart.defaults.font.family = "'Anonymous Pro', monospace";
Chart.defaults.font.size = 10;
Chart.defaults.color = '#4a6080';

function sharedScaleX(labels) {
  return {
    ticks: {
      maxTicksLimit: 8,
      maxRotation: 0,
      color: '#4a6080',
      font: { size:10 }
    },
    grid: { color:'rgba(221,216,208,0.5)' }
  };
}

// ── BUILD CHARTS ──────────────────────────────────────────────────────────────
function buildCharts(range) {
  const data = filterByRange(RAW, range);
  const labels = data.map(r => r.d);
  const closes = data.map(r => r.c);
  const vols = data.map(r => r.v);
  const pcts = pctChange(data);
  const avg30 = movingAvg(data, 30);

  // Event marker annotation points
  const eventPoints = EVENTS.map(e => {
    const idx = labels.indexOf(e.d);
    return idx >= 0 ? { x: e.d, y: closes[idx], label: e.label, color: e.color } : null;
  }).filter(Boolean);

  // Price display
  const latest = data[data.length-1];
  const prev = data[data.length-2];
  const chg = latest.c - prev.c;
  const chgPct = (chg/prev.c*100).toFixed(2);
  document.getElementById('priceDisplay').textContent = '$' + latest.c.toFixed(2);
  const pcEl = document.getElementById('priceChange');
  pcEl.textContent = (chg>=0?'+':'') + chg.toFixed(2) + ' (' + (chg>=0?'+':'') + chgPct + '%) latest session';
  pcEl.className = 'price-change ' + (chg>=0?'up':'down');

  // Destroy existing
  if(priceChart) priceChart.destroy();
  if(volChart) volChart.destroy();
  if(pctChart) pctChart.destroy();

  // ── PRICE CHART ──
  const pricePlugin = {
    id:'eventMarkers',
    afterDraw(chart) {
      if(!showMarkers) return;
      const {ctx, scales:{x,y}} = chart;
      eventPoints.forEach(ep => {
        const xi = labels.indexOf(ep.x);
        if(xi<0) return;
        const px = x.getPixelForValue(xi);
        const py = y.getPixelForValue(ep.y);
        // Vertical line
        ctx.save();
        ctx.setLineDash([3,3]);
        ctx.strokeStyle = ep.color + '88';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px, chart.chartArea.top);
        ctx.lineTo(px, chart.chartArea.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        // Dot
        ctx.beginPath();
        ctx.arc(px, py, 5, 0, Math.PI*2);
        ctx.fillStyle = ep.color;
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      });
    }
  };

  priceChart = new Chart(document.getElementById('priceChart'), {
    type: 'line',
    plugins: [pricePlugin],
    data: {
      labels,
      datasets: [
        {
          label: 'Close',
          data: closes,
          borderColor: '#0a1628',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.2,
          fill: {
            target: 'origin',
            above: 'rgba(10,22,40,0.04)'
          }
        },
        {
          label: '30-day avg',
          data: avg30,
          borderColor: '#b8930a',
          borderWidth: 1,
          borderDash: [4,3],
          pointRadius: 0,
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor: '#0a1628',
          titleColor: '#b8930a',
          bodyColor: '#e8d5a0',
          padding: 10,
          callbacks: {
            title: items => items[0].label,
            label: item => {
              if(item.datasetIndex===0) return ' Close: $' + item.parsed.y.toFixed(2);
              if(item.parsed.y===null) return null;
              return ' 30-day avg: $' + item.parsed.y.toFixed(2);
            }
          }
        }
      },
      scales: {
        x: sharedScaleX(labels),
        y: {
          position: 'right',
          ticks: { color:'#4a6080', callback: v=>'$'+v, font:{size:10} },
          grid: { color:'rgba(221,216,208,0.5)' }
        }
      },
      onHover(evt, items, chart) {
        if(!showMarkers || !items.length) {
          document.getElementById('eventTip').classList.remove('visible');
          return;
        }
        const xi = items[0].index;
        const label = labels[xi];
        const ev = EVENTS.find(e => e.d === label);
        if(ev) {
          const tip = document.getElementById('eventTip');
          tip.innerHTML = ev.label.replace(/\n/g,'<br>');
          tip.style.borderColor = ev.color;
          const rect = chart.canvas.getBoundingClientRect();
          const px = chart.scales.x.getPixelForValue(xi);
          tip.style.left = Math.min(px + 8, chart.chartArea.right - 210) + 'px';
          tip.style.top = '12px';
          tip.classList.add('visible');
        } else {
          document.getElementById('eventTip').classList.remove('visible');
        }
      }
    }
  });

  // ── VOLUME CHART ──
  volChart = new Chart(document.getElementById('volChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: vols,
        backgroundColor: vols.map((v,i) => {
          if(i===0) return 'rgba(42,122,79,0.7)';
          return closes[i] >= closes[i-1] ? 'rgba(42,122,79,0.7)' : 'rgba(160,41,30,0.7)';
        }),
        borderWidth: 0,
        barPercentage: 0.8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor:'#0a1628',
          titleColor:'#b8930a',
          bodyColor:'#e8d5a0',
          padding:8,
          callbacks: {
            title: items => items[0].label,
            label: item => ' Volume: ' + fmtVol(item.parsed.y)
          }
        }
      },
      scales: {
        x: { ...sharedScaleX(labels), ticks:{ display:false }, grid:{ display:false } },
        y: {
          position:'right',
          ticks: { color:'#4a6080', callback: v => fmtVol(v), font:{size:9}, maxTicksLimit:3 },
          grid: { color:'rgba(221,216,208,0.3)' }
        }
      }
    }
  });

  // ── PCT CHANGE CHART ──
  pctChart = new Chart(document.getElementById('pctChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: pcts,
        backgroundColor: pcts.map(v => v >= 0 ? 'rgba(42,122,79,0.75)' : 'rgba(160,41,30,0.75)'),
        borderWidth: 0,
        barPercentage: 0.8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor:'#0a1628',
          titleColor:'#b8930a',
          bodyColor:'#e8d5a0',
          padding:8,
          callbacks: {
            title: items => items[0].label,
            label: item => ' Daily change: ' + (item.parsed.y>=0?'+':'') + item.parsed.y.toFixed(2) + '%'
          }
        }
      },
      scales: {
        x: { ...sharedScaleX(labels), ticks:{display:false}, grid:{display:false} },
        y: {
          position:'right',
          ticks: { color:'#4a6080', callback: v=>v+'%', font:{size:9}, maxTicksLimit:4 },
          grid: { color:'rgba(221,216,208,0.3)' }
        }
      }
    }
  });
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = btn.dataset.range;
    buildCharts(currentRange);
  });
});

document.getElementById('markerToggle').addEventListener('click', function() {
  showMarkers = !showMarkers;
  this.classList.toggle('active', showMarkers);
  if(priceChart) priceChart.update();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
buildCharts('3m');
</script>
