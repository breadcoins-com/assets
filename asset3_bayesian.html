<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

  :root {
    --navy: #0a1628;
    --gold: #b8930a;
    --gold-mid: #c9a84c;
    --navy-dim: #4a6080;
    --blue: #2a5a9a;
    --rule: #ddd8d0;
    --off: #f7f4ef;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--white); font-family: 'Anonymous Pro', monospace; }

  .asset { width: 100%; aspect-ratio: 4/3; display: flex; flex-direction: column; overflow: hidden; background: var(--white); }

  .hdr { padding: clamp(8px,2vw,16px) clamp(12px,3vw,24px); border-bottom: 2px solid var(--navy); flex-shrink: 0; display: flex; justify-content: space-between; align-items: flex-end; }
  .hdr-left { display: flex; flex-direction: column; gap: 3px; }
  .eyebrow { font-size: clamp(9px,1.8vw,12px); letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); font-weight: 700; }
  .title { font-family: 'Playfair Display', serif; font-size: clamp(14px,2.8vw,22px); color: var(--navy); font-weight: 700; line-height: 1.15; }
  .title em { font-style: italic; color: var(--gold); }
  .gold-rule { width: clamp(20px,4vw,40px); height: 2px; background: var(--gold-mid); margin-top: 4px; }
  .tap-hint { font-size: clamp(9px,1.5vw,11px); color: var(--navy-dim); font-style: italic; }

  .body { flex: 1; min-height: 0; display: flex; gap: clamp(8px,2vw,14px); padding: clamp(6px,1.2vw,12px) clamp(12px,3vw,24px); overflow: hidden; }

  /* Prior */
  .prior {
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    width: clamp(60px,14vw,100px); flex-shrink: 0;
    border-right: 1px solid var(--rule);
    padding-right: clamp(6px,1.5vw,12px);
    gap: 3px; text-align: center;
  }
  .prior-label { font-size: clamp(8px,1.4vw,10px); letter-spacing: 0.12em; text-transform: uppercase; color: var(--navy-dim); }
  .prior-num { font-family: 'Playfair Display', serif; font-size: clamp(24px,5.5vw,40px); font-weight: 700; color: var(--navy-dim); line-height: 1; }
  .prior-desc { font-size: clamp(8px,1.3vw,10px); color: var(--navy-dim); line-height: 1.3; }

  /* Chain */
  .chain { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: clamp(3px,0.6vw,5px); overflow: hidden; }

  .node {
    border: 1px solid var(--rule);
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .node:hover, .node.open { border-color: var(--gold-mid); background: var(--off); }
  .node.open { border-color: var(--gold); }

  .node-main {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: clamp(6px,1.5vw,10px);
    padding: clamp(4px,1vw,8px) clamp(6px,1.5vw,12px);
    align-items: center;
  }

  .event-text { font-size: clamp(10px,1.8vw,13px); color: var(--navy); line-height: 1.3; }

  .scores { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; flex-shrink: 0; }
  .s-cow { font-size: clamp(12px,2.2vw,17px); font-weight: 700; color: var(--blue); line-height: 1; }
  .s-eco { font-size: clamp(12px,2.2vw,17px); font-weight: 700; color: var(--gold); line-height: 1; }
  .s-lbl { font-size: clamp(8px,1.3vw,10px); color: var(--navy-dim); letter-spacing: 0.1em; text-transform: uppercase; text-align: right; }

  .prog { height: 3px; background: var(--rule); position: relative; }
  .prog-thresh { position: absolute; top:0; bottom:0; left:70%; width:1px; background: var(--navy-dim); opacity:0.3; }
  .prog-cow { position: absolute; top:0; left:0; height:50%; background: var(--blue); transition: width 0.5s; }
  .prog-eco { position: absolute; bottom:0; left:0; height:50%; background: var(--gold); transition: width 0.5s; }

  .node-detail { max-height:0; overflow:hidden; transition: max-height 0.3s ease, opacity 0.2s; opacity:0; }
  .node.open .node-detail { max-height:200px; opacity:1; }

  .detail-inner {
    padding: clamp(5px,1.2vw,10px) clamp(6px,1.5vw,12px);
    border-top: 1px solid var(--rule);
    font-size: clamp(9px,1.6vw,12px);
    color: var(--navy-dim);
    line-height: 1.5;
    display: flex; gap: clamp(6px,1.5vw,10px);
  }

  .bf-box { flex-shrink: 0; }
  .bf-label { font-size: clamp(8px,1.3vw,10px); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
  .bf-val { font-family: 'Playfair Display', serif; font-size: clamp(14px,2.5vw,20px); font-weight: 700; line-height: 1; }
  .bf-jump { font-size: clamp(8px,1.3vw,10px); margin-top: 2px; }

  /* Final */
  .final {
    display: flex; gap: clamp(3px,0.8vw,6px);
    margin-top: auto; flex-shrink: 0;
  }

  .final-cell { flex:1; padding: clamp(5px,1.2vw,10px) clamp(6px,1.5vw,12px); border-top: 3px solid transparent; background: var(--off); }
  .fc-cow { border-top-color: var(--blue); }
  .fc-eco { border-top-color: var(--gold); }
  .fc-model { font-size: clamp(8px,1.3vw,10px); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
  .fc-score { font-family: 'Playfair Display', serif; font-size: clamp(20px,4vw,32px); font-weight: 700; line-height: 1; }
  .fc-verdict { font-size: clamp(9px,1.5vw,11px); color: var(--navy-dim); line-height: 1.3; margin-top: 3px; }

  .ftr { padding: clamp(4px,1vw,8px) clamp(12px,3vw,24px); border-top: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: var(--off); }
  .ftr-note { font-size: clamp(8px,1.4vw,11px); color: var(--navy-dim); font-style: italic; }
  .ftr-brand { font-size: clamp(8px,1.4vw,11px); letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); font-weight: 700; }
</style>
</head>
<body>
<div class="asset">

  <div class="hdr">
    <div class="hdr-left">
      <div class="eyebrow">Parlay Economics | Home Economics Journal</div>
      <div class="title">Evidence Arrives. <em>The Posterior Climbs.</em></div>
      <div class="gold-rule"></div>
    </div>
    <div class="tap-hint">Tap to expand</div>
  </div>

  <div class="body">

    <div class="prior">
      <div class="prior-label">Prior P(WW)</div>
      <div class="prior-num">0.15</div>
      <div class="prior-desc">Historical base rate</div>
    </div>

    <div class="chain" id="chain"></div>

  </div>

  <div class="ftr">
    <div class="ftr-note">Analytical framework only. Not investment advice.</div>
    <div class="ftr-brand">© Breadcoins.com</div>
  </div>

</div>

<script>
const events = [
  { text: 'Russia-Ukraine: 40+ NATO states, fourth year of sustained combat',
    cow:0.36, eco:0.43, prev:[0.15,0.15], bf:[3.2,4.1],
    detail:'S1 cleared. Great-power proxy engagement confirmed. Largest single Bayes factor in the chain.' },
  { text: 'Houthi attacks: 100+ vessel strikes, 60+ nations, Hormuz under pressure',
    cow:0.49, eco:0.68, prev:[0.36,0.43], bf:[2.1,3.8],
    detail:'S2 domain count rises. 20% of global petroleum transit affected. Economic model weights chokepoint control heavily.' },
  { text: 'Iranian cyber operations against US and Canadian critical infrastructure',
    cow:0.53, eco:0.79, prev:[0.49,0.68], bf:[1.4,2.2],
    detail:'S2 domain 3 confirmed: cyber. Models diverge — CoW discounts cyber, economic model treats it as supply disruption.' },
  { text: 'BRICS de-dollarization: coordinated reserve diversification across four powers',
    cow:0.57, eco:0.84, prev:[0.53,0.79], bf:[1.2,3.1],
    detail:'Largest model divergence on a single factor. Economic model treats reserve pressure as the primary strategic objective.' },
  { text: 'Chinese and Russian material support to Iran. 2025 Russia-Iran treaty signed.',
    cow:0.59, eco:0.86, prev:[0.57,0.84], bf:[1.1,1.4],
    detail:'Actor set overlap confirmed. No mutual defense obligation. Proxy penalty partially applied.' },
  { text: 'Direct US-Iran combat, February 2026. China and Russia remain in supporting set.',
    cow:0.61, eco:0.88, prev:[0.59,0.86], bf:[1.05,1.3],
    detail:'The decisive observable. CoW: principal powers not co-belligerent. Economic model: proxy doing strategic work. Gap: 0.27.' },
];

const chain = document.getElementById('chain');

events.forEach(e => {
  const node = document.createElement('div');
  node.className = 'node';
  const jc = ((e.cow-e.prev[0])*100).toFixed(0);
  const je = ((e.eco-e.prev[1])*100).toFixed(0);
  node.innerHTML = `
    <div class="node-main">
      <div class="event-text">${e.text}</div>
      <div class="scores">
        <div class="s-cow">${e.cow.toFixed(2)}</div>
        <div class="s-eco">${e.eco.toFixed(2)}</div>
        <div class="s-lbl">post.</div>
      </div>
    </div>
    <div class="prog">
      <div class="prog-thresh"></div>
      <div class="prog-cow" style="width:${e.cow*100}%"></div>
      <div class="prog-eco" style="width:${e.eco*100}%"></div>
    </div>
    <div class="node-detail">
      <div class="detail-inner">
        <div class="bf-box">
          <div class="bf-label" style="color:#2a5a9a">CoW BF</div>
          <div class="bf-val" style="color:#2a5a9a">${e.bf[0]}</div>
          <div class="bf-jump" style="color:#2a5a9a">+${jc}pp</div>
        </div>
        <div class="bf-box">
          <div class="bf-label" style="color:#b8930a">Econ BF</div>
          <div class="bf-val" style="color:#b8930a">${e.bf[1]}</div>
          <div class="bf-jump" style="color:#b8930a">+${je}pp</div>
        </div>
        <div>${e.detail}</div>
      </div>
    </div>
  `;
  node.addEventListener('click', () => {
    const open = node.classList.contains('open');
    document.querySelectorAll('.node').forEach(n => n.classList.remove('open'));
    if (!open) node.classList.add('open');
  });
  chain.appendChild(node);
});

// Final row
const final = document.createElement('div');
final.className = 'final';
final.innerHTML = `
  <div class="final-cell fc-cow">
    <div class="fc-model" style="color:#2a5a9a">Correlates of War</div>
    <div class="fc-score" style="color:#2a5a9a">0.61</div>
    <div class="fc-verdict">Below threshold. China and Russia not co-belligerent.</div>
  </div>
  <div class="final-cell fc-eco">
    <div class="fc-model" style="color:#b8930a">Economic Restructuring</div>
    <div class="fc-score" style="color:#b8930a">0.88</div>
    <div class="fc-verdict">Above threshold. Restructuring in progress.</div>
  </div>
`;
chain.appendChild(final);
</script>
</body>
</html>
