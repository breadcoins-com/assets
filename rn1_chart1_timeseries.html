<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
  :root {
    --navy:#0a1628; --gold:#b8930a; --gold-mid:#c9a84c;
    --navy-dim:#4a6080; --blue:#2a5a9a; --rule:#ddd8d0;
    --off:#f7f4ef; --white:#ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; background:var(--white); font-family:'Anonymous Pro',monospace; }

  .asset {
    width:100%;
    display:flex;
    flex-direction:column;
    background:var(--white);
    border:1px solid var(--rule);
  }

  .hdr {
    padding:clamp(10px,2vw,18px) clamp(14px,3vw,28px);
    border-bottom:2px solid var(--navy);
    flex-shrink:0;
  }
  .eyebrow { font-size:clamp(10px,1.8vw,12px); letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:4px; }
  .title { font-family:'Playfair Display',serif; font-size:clamp(16px,2.8vw,24px); color:var(--navy); font-weight:700; line-height:1.2; }
  .title em { font-style:italic; color:var(--gold); }
  .gold-rule { width:40px; height:2px; background:var(--gold-mid); margin-top:5px; }

  .chart-outer {
    padding:clamp(12px,2vw,20px) clamp(14px,3vw,28px);
    background:var(--white);
  }

  .chart-container {
    position:relative;
    width:100%;
    height:0;
    padding-bottom:56%;
  }

  .chart-container canvas {
    position:absolute;
    top:0; left:0;
    width:100% !important;
    height:100% !important;
  }

  .ftr {
    padding:clamp(6px,1.2vw,10px) clamp(14px,3vw,28px);
    border-top:1px solid var(--rule);
    display:flex; justify-content:space-between; align-items:center;
    background:var(--off);
  }
  .ftr-note { font-size:clamp(9px,1.4vw,11px); color:var(--navy-dim); font-style:italic; }
  .ftr-brand { font-size:clamp(9px,1.4vw,11px); letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); font-weight:700; }
</style>
</head>
<body>
<div class="asset">
  <div class="hdr">
    <div class="eyebrow">The Real Numbers | Home Economics Journal</div>
    <div class="title">50 Years of Stocks and Gold — <em>Five Economic Eras</em></div>
    <div class="gold-rule"></div>
  </div>
  <div class="chart-outer">
    <div class="chart-container">
      <canvas id="c"></canvas>
    </div>
  </div>
  <div class="ftr">
    <div class="ftr-note">Annual gain Y_t = P_t minus P_{t-52wk}. S&P 500 1976-2026. Gold spot price.</div>
    <div class="ftr-brand">© Breadcoins.com</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const years = Array.from({length:51}, (_,i) => 1976+i);

const sp500 = [
  90,35,-25,35,25,90,140,60,40,80,120,55,80,170,200,240,180,270,310,
  -110,-250,-200,130,120,140,190,200,160,-500,-250,200,190,280,430,550,
  380,280,-80,400,330,350,490,800,600,-400,-450,550,750,600,530,789
];

const gold = [
  35,60,120,190,300,95,-65,-85,-45,-25,45,35,60,12,8,15,25,35,75,
  -30,45,65,85,75,95,135,145,215,280,195,-80,-175,-30,45,65,55,100,
  125,180,280,350,420,300,200,-200,-45,180,250,280,350,1645
];

const eras = [
  {start:1976,end:1982,color:'rgba(184,147,10,0.10)',label:'Inflation Era'},
  {start:1983,end:1999,color:'rgba(42,90,154,0.07)',label:'Great Moderation'},
  {start:2000,end:2009,color:'rgba(184,147,10,0.10)',label:'Lost Decade'},
  {start:2010,end:2019,color:'rgba(42,90,154,0.07)',label:'QE Era'},
  {start:2020,end:2026,color:'rgba(184,147,10,0.15)',label:'Current'},
];

// Era shading as annotations via custom plugin
const eraPlugin = {
  id: 'eraShading',
  beforeDraw(chart) {
    const {ctx, chartArea:{left,right,top,bottom}, scales:{x}} = chart;
    if (!x) return;
    ctx.save();
    eras.forEach(era => {
      const x0 = x.getPixelForValue(era.start - 1976);
      const x1 = x.getPixelForValue(era.end - 1976);
      ctx.fillStyle = era.color;
      ctx.fillRect(x0, top, x1-x0, bottom-top);
      ctx.fillStyle = 'rgba(100,100,100,0.5)';
      ctx.font = `bold 10px Anonymous Pro`;
      ctx.textAlign = 'center';
      ctx.fillText(era.label, (x0+x1)/2, top+14);
    });
    ctx.restore();
  }
};

new Chart(document.getElementById('c'), {
  type: 'line',
  plugins: [eraPlugin],
  data: {
    labels: years,
    datasets: [
      {
        label: 'S&P 500',
        data: sp500,
        borderColor: '#2a5a9a',
        backgroundColor: 'transparent',
        borderWidth: 2,
        pointRadius: 2,
        pointHoverRadius: 5,
        tension: 0.3,
      },
      {
        label: 'Gold',
        data: gold,
        borderColor: '#b8930a',
        backgroundColor: 'transparent',
        borderWidth: 2.5,
        pointRadius: 2,
        pointHoverRadius: 5,
        tension: 0.3,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: true,
    interaction: { mode:'index', intersect:false },
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          font: { family:'Anonymous Pro', size:11 },
          color: '#4a6080',
          boxWidth: 20,
          padding: 12,
        }
      },
      tooltip: {
        callbacks: {
          label: c => `${c.dataset.label}: ${c.parsed.y > 0 ? '+' : ''}${c.parsed.y}`
        }
      }
    },
    scales: {
      x: {
        ticks: {
          font:{ family:'Anonymous Pro', size:10 },
          color:'#8a9ab8',
          maxRotation:0,
          callback: (v,i) => [1976,1985,1995,2005,2015,2026].includes(years[i]) ? years[i] : ''
        },
        grid: { color:'#ece8e2' }
      },
      y: {
        ticks: { font:{family:'Anonymous Pro',size:10}, color:'#8a9ab8' },
        grid: { color:'#ece8e2' },
        title: { display:true, text:'Annual gain ($)', font:{family:'Anonymous Pro',size:10}, color:'#8a9ab8' }
      }
    }
  }
});
</script>
</body>
</html>
