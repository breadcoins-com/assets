<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
  :root { --navy:#0a1628; --gold:#b8930a; --gold-mid:#c9a84c; --navy-dim:#4a6080; --blue:#2a5a9a; --rule:#ddd8d0; --off:#f7f4ef; --white:#ffffff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; background:var(--white); font-family:'Anonymous Pro',monospace; }
  .asset { width:100%; aspect-ratio:4/3; display:flex; flex-direction:column; overflow:hidden; background:var(--white); }
  .hdr { padding:clamp(8px,2vw,16px) clamp(12px,3vw,24px); border-bottom:2px solid var(--navy); flex-shrink:0; }
  .eyebrow { font-size:clamp(9px,1.8vw,12px); letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:3px; }
  .title { font-family:'Playfair Display',serif; font-size:clamp(14px,2.8vw,22px); color:var(--navy); font-weight:700; line-height:1.15; }
  .title em { font-style:italic; color:var(--gold); }
  .gold-rule { width:clamp(20px,4vw,40px); height:2px; background:var(--gold-mid); margin-top:4px; }
  .body { flex:1; min-height:0; padding:clamp(6px,1.2vw,12px) clamp(12px,3vw,24px); position:relative; overflow:hidden; }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  .ftr { padding:clamp(4px,1vw,8px) clamp(12px,3vw,24px); border-top:1px solid var(--rule); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; background:var(--off); }
  .ftr-note { font-size:clamp(8px,1.4vw,11px); color:var(--navy-dim); font-style:italic; }
  .ftr-brand { font-size:clamp(8px,1.4vw,11px); letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); font-weight:700; }
</style>
</head>
<body>
<div class="asset">
  <div class="hdr">
    <div class="eyebrow">The Real Numbers | Home Economics Journal</div>
    <div class="title">Gold vs Stocks — <em>Who Won Each Year Since 1976</em></div>
    <div class="gold-rule"></div>
  </div>
  <div class="body"><canvas id="c"></canvas></div>
  <div class="ftr">
    <div class="ftr-note">Gold annual gain divided by S&P 500 annual gain. Clipped at +5 / -5. Above 1.0 = gold year. Below 1.0 = stocks year.</div>
    <div class="ftr-brand">© Breadcoins.com</div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const years = [];
for(let y=1976;y<=2026;y++) years.push(y);

// Ratio: gold annual gain / S&P annual gain, clipped at +/-5
const ratios = [
  0.39,1.71,4.8,-3.4,12.0,1.05,-0.46,-1.44,-1.13,-0.31,0.38,0.64,0.75,0.07,0.04,0.06,
  0.13,0.13,0.24,-0.68,-1.25,-2.25,0.65,0.58,0.67,0.71,0.73,1.34,0.56,0.78,-0.40,-3.9,
  -0.21,0.83,0.46,0.29,0.50,1.56,0.45,0.85,0.58,0.50,0.44,0.33,-2.0,-0.10,0.33,0.33,
  0.47,0.66,0.67,0.60,1.00,2.00
].map(v => Math.max(-5, Math.min(5, v)));

const currentIdx = years.indexOf(2022);

const colors = ratios.map((v,i) => {
  if(i >= currentIdx) return v >= 1.0 ? 'rgba(184,147,10,1.0)' : 'rgba(42,90,154,0.9)';
  return v >= 1.0 ? 'rgba(184,147,10,0.55)' : 'rgba(42,90,154,0.45)';
});

new Chart(document.getElementById('c'),{
  type:'bar',
  data:{
    labels: years,
    datasets:[{
      data: ratios,
      backgroundColor: colors,
      borderWidth:0
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
      legend:{display:false},
      tooltip:{callbacks:{
        label: c => `${c.label}: ratio ${c.parsed.y.toFixed(2)} (${c.parsed.y>=1?'gold year':'stocks year'})`
      }}
    },
    scales:{
      x:{
        ticks:{
          font:{size:9},
          maxRotation:0,
          callback:(v,i) => [1976,1985,1995,2005,2015,2026].includes(years[i]) ? years[i] : ''
        },
        grid:{display:false}
      },
      y:{
        min:-5,max:5,
        ticks:{font:{size:9}},
        grid:{color:'#ece8e2'},
        title:{display:true,text:'Gold/Stocks ratio',font:{size:9}}
      }
    },
    annotation:{
      annotations:{
        line1:{type:'line',yMin:1,yMax:1,borderColor:'#b8930a',borderWidth:1.5,borderDash:[4,4]},
        line0:{type:'line',yMin:0,yMax:0,borderColor:'#ccc',borderWidth:1}
      }
    }
  },
  plugins:[{
    id:'threshold',
    afterDraw(chart) {
      const {ctx,chartArea:{top,bottom,left,right},scales:{y}} = chart;
      const y1 = y.getPixelForValue(1.0);
      const y0 = y.getPixelForValue(0);
      ctx.save();
      ctx.strokeStyle = '#b8930a';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5,5]);
      ctx.beginPath();
      ctx.moveTo(left,y1);
      ctx.lineTo(right,y1);
      ctx.stroke();
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(left,y0);
      ctx.lineTo(right,y0);
      ctx.stroke();
      const fs = Math.max(9, chart.width*0.022);
      ctx.fillStyle = '#b8930a';
      ctx.font = `${fs}px Anonymous Pro`;
      ctx.textAlign = 'left';
      ctx.fillText('Gold wins above this line', left+4, y1-4);
      // NOW label
      const nowI = years.indexOf(2026);
      const meta = chart.getDatasetMeta(0);
      if(meta.data[nowI]) {
        const x = meta.data[nowI].x;
        ctx.strokeStyle = '#b8930a66';
        ctx.lineWidth=1; ctx.setLineDash([2,4]);
        ctx.beginPath(); ctx.moveTo(x,top); ctx.lineTo(x,bottom); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle='#b8930a';
        ctx.textAlign='center';
        ctx.fillText('NOW', x, top+fs);
      }
      ctx.restore();
    }
  }]
});
</script>
</body>
</html>
