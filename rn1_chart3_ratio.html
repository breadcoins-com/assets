<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
  :root { --navy:#0a1628; --gold:#b8930a; --gold-mid:#c9a84c; --navy-dim:#4a6080; --blue:#2a5a9a; --rule:#ddd8d0; --off:#f7f4ef; --white:#ffffff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; background:var(--white); font-family:'Anonymous Pro',monospace; }
  .asset { width:100%; display:flex; flex-direction:column; background:var(--white); border:1px solid var(--rule); }
  .hdr { padding:clamp(10px,2vw,18px) clamp(14px,3vw,28px); border-bottom:2px solid var(--navy); }
  .eyebrow { font-size:clamp(10px,1.8vw,12px); letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:4px; }
  .title { font-family:'Playfair Display',serif; font-size:clamp(16px,2.8vw,24px); color:var(--navy); font-weight:700; line-height:1.2; }
  .title em { font-style:italic; color:var(--gold); }
  .gold-rule { width:40px; height:2px; background:var(--gold-mid); margin-top:5px; }
  .chart-outer { padding:clamp(12px,2vw,20px) clamp(14px,3vw,28px); }
  .chart-container { position:relative; width:100%; height:0; padding-bottom:52%; }
  .chart-container canvas { position:absolute; top:0; left:0; width:100%!important; height:100%!important; }
  .ftr { padding:clamp(6px,1.2vw,10px) clamp(14px,3vw,28px); border-top:1px solid var(--rule); display:flex; justify-content:space-between; align-items:center; background:var(--off); }
  .ftr-note { font-size:clamp(9px,1.4vw,11px); color:var(--navy-dim); font-style:italic; }
  .ftr-brand { font-size:clamp(9px,1.4vw,11px); letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); font-weight:700; }
</style>
</head>
<body>
<div class="asset">
  <div class="hdr">
    <div class="eyebrow">The Real Numbers | Home Economics Journal</div>
    <div class="title">Gold vs Stocks — <em>Who Won Each Year Since 1976</em></div>
    <div class="gold-rule"></div>
  </div>
  <div class="chart-outer">
    <div class="chart-container"><canvas id="c"></canvas></div>
  </div>
  <div class="ftr">
    <div class="ftr-note">Gold annual gain divided by S&P 500 annual gain. Clipped at +5 / -5. Above 1.0 = gold year.</div>
    <div class="ftr-brand">© Breadcoins.com</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const years = Array.from({length:51}, (_,i) => 1976+i);

const rawRatios = [
  0.39,1.71,4.8,-3.4,5.0,1.05,-0.46,-1.44,-1.13,-0.31,0.38,0.64,0.75,0.07,0.04,0.06,
  0.13,0.13,0.24,-0.68,-1.25,-2.25,0.65,0.58,0.67,0.71,0.73,1.34,0.56,0.78,-0.40,-3.9,
  -0.21,0.83,0.46,0.29,0.50,1.56,0.45,0.85,0.58,0.50,0.44,0.33,-2.0,-0.10,0.33,0.33,
  0.47,0.66,2.00
];

const ratios = rawRatios.map(v => Math.max(-5, Math.min(5, v)));
const currentStart = years.indexOf(2020);

const colors = ratios.map((v,i) => {
  const isCurrent = i >= currentStart;
  if (v >= 1.0) return isCurrent ? 'rgba(184,147,10,1.0)' : 'rgba(184,147,10,0.5)';
  if (v < 0)    return isCurrent ? 'rgba(139,0,0,0.85)'   : 'rgba(139,0,0,0.4)';
  return isCurrent ? 'rgba(42,90,154,0.9)' : 'rgba(42,90,154,0.45)';
});

const thresholdPlugin = {
  id:'threshold',
  afterDraw(chart) {
    const {ctx, chartArea:{left,right,top,bottom}, scales:{y}} = chart;
    ctx.save();
    // 1.0 line
    const y1 = y.getPixelForValue(1.0);
    ctx.strokeStyle = '#b8930a';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(left,y1); ctx.lineTo(right,y1); ctx.stroke();
    ctx.fillStyle = '#b8930a';
    ctx.font = 'bold 10px Anonymous Pro';
    ctx.textAlign = 'left';
    ctx.fillText('Gold wins above this line', left+4, y1-5);
    // 0 line
    const y0 = y.getPixelForValue(0);
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(left,y0); ctx.lineTo(right,y0); ctx.stroke();
    // NOW label
    const nowI = years.indexOf(2026);
    const meta = chart.getDatasetMeta(0);
    if(meta.data[nowI]) {
      const nx = meta.data[nowI].x;
      ctx.strokeStyle = '#b8930a66';
      ctx.lineWidth=1; ctx.setLineDash([2,4]);
      ctx.beginPath(); ctx.moveTo(nx,top); ctx.lineTo(nx,bottom); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#b8930a';
      ctx.textAlign='center';
      ctx.fillText('NOW', nx, top+12);
    }
    ctx.restore();
  }
};

new Chart(document.getElementById('c'), {
  type: 'bar',
  plugins: [thresholdPlugin],
  data: {
    labels: years,
    datasets: [{
      data: ratios,
      backgroundColor: colors,
      borderWidth: 0,
      barPercentage: 0.9,
      categoryPercentage: 1.0,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: true,
    plugins: {
      legend: { display:false },
      tooltip: {
        callbacks: {
          label: c => `${c.label}: ${c.parsed.y.toFixed(2)} (${c.parsed.y>=1?'gold year':c.parsed.y<0?'opposite direction':'stocks year'})`
        }
      }
    },
    scales: {
      x: {
        ticks: {
          font:{family:'Anonymous Pro',size:9},
          color:'#8a9ab8',
          maxRotation:0,
          callback: (v,i) => [1976,1985,1995,2005,2015,2026].includes(years[i]) ? years[i] : ''
        },
        grid:{ display:false }
      },
      y: {
        min:-5, max:5,
        ticks:{ font:{family:'Anonymous Pro',size:10}, color:'#8a9ab8' },
        grid:{ color:'#ece8e2' },
        title:{ display:true, text:'Gold / Stocks ratio', font:{family:'Anonymous Pro',size:10}, color:'#8a9ab8' }
      }
    }
  }
});
</script>
</body>
</html>
